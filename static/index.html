<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>날씨 정보 - 물류 거점</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-text">
                <h1>물류 거점 날씨 현황</h1>
                <p class="subtitle">내일 날씨 예보 기반 거점별 안전 현황</p>
            </div>
            <div class="header-badge">실시간 데이터</div>
        </header>

        <div class="search-section">
            <div class="search-box">
                <input
                    type="text"
                    id="searchInput"
                    placeholder="거점 이름으로 검색 (예: 서울, 부산)"
                    autocomplete="off"
                >
                <button id="searchBtn" onclick="searchLocation()">검색</button>
                <button id="allBtn" onclick="loadAllWeather()">전체 보기</button>
            </div>
            <div id="errorMessage" class="error-message"></div>
        </div>

        <div class="filters">
            <label>
                <input type="checkbox" id="filterClear" onchange="applyFilters()">
                맑음만 보기
            </label>
            <label>
                <input type="checkbox" id="filterRain" onchange="applyFilters()">
                강수 있는 곳만 보기
            </label>
        </div>

        <div id="loadingSpinner" class="loading-spinner" style="display: none;">
            <div class="spinner"></div>
            <p>데이터를 불러오는 중...</p>
        </div>

        <div id="weatherContainer" class="weather-container">
            <p class="no-data">아래 버튼을 클릭하여 날씨 정보를 불러오세요</p>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
